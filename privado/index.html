<style>

:root{--paper:#EEF4FB;--paper-2:#E1ECF7;--card:#FBFDFF;--ink:#0B1E38;--ink-soft:#45596F;--ink-faint:#6E809A;
--line:#CBDAEA;--accent:#0077C8;--accent-deep:#004FB7;--accent-2:#2E9BD6;--marino:#003A78;--tint:#DCEBF8;
--law:#B5741C;--law-tint:#F5E9D6;
--sans:ui-sans-serif,-apple-system,'Segoe UI',Roboto,'Helvetica Neue',system-ui,sans-serif;
--display:'Iowan Old Style','Palatino Linotype','Book Antiqua',Palatino,Georgia,serif;}
@media (prefers-color-scheme:dark){:root{--paper:#071324;--paper-2:#0B1B30;--card:#0E2136;--ink:#E6EFF9;
--ink-soft:#A2B6CE;--ink-faint:#7C90AC;--line:#1D3452;--accent:#3BA3E8;--accent-deep:#6FC2F2;--accent-2:#57C0EE;
--marino:#8FC4EE;--tint:#122a44;--law:#DDB165;--law-tint:#241B0E;}}

*{box-sizing:border-box}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
.lock{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  background:linear-gradient(160deg,#003A78,#004FB7 55%,#0077C8)}
.box{background:var(--card);border-radius:16px;padding:34px 30px;max-width:400px;width:100%;
  box-shadow:0 24px 60px -20px rgba(0,0,0,.5);text-align:center}
.box svg{width:56px;height:56px;margin-bottom:14px}
.box h1{font-family:var(--display);font-weight:600;font-size:1.4rem;margin:0 0 6px;color:var(--ink)}
.box p{margin:0 0 20px;font-size:.9rem;color:var(--ink-soft)}
.box input{width:100%;padding:12px 14px;font-size:1rem;border:1px solid var(--line);border-radius:9px;
  background:var(--paper);color:var(--ink);margin-bottom:12px;font-family:var(--sans)}
.box input:focus{outline:2px solid var(--accent);border-color:var(--accent)}
.box button{width:100%;padding:12px;font-size:1rem;font-weight:700;border:0;border-radius:9px;
  background:var(--accent-deep);color:#fff;cursor:pointer;font-family:var(--sans)}
.box button:hover{background:var(--accent)}
.err{color:#C0392B;font-size:.85rem;min-height:1.2em;margin-top:10px;font-weight:600}
.wrap2{max-width:900px;margin:0 auto;padding:40px clamp(18px,5vw,48px) 80px}
#content{display:none}
.topbar{background:var(--marino);color:#fff;padding:10px 18px;font-size:.78rem;display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px}
.topbar a{color:#BFE6FF}
</style>

function b64(s){const bin=atob(s);const u=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i);return u.buffer;}
async function decrypt(pw){
  const enc=new TextEncoder();
  const baseKey=await crypto.subtle.importKey('raw',enc.encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:b64(BLOB.salt),iterations:BLOB.iter,hash:'SHA-256'},
    baseKey,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:b64(BLOB.iv)},key,b64(BLOB.ct));
  return new TextDecoder().decode(pt);
}
const f=document.getElementById('f'),err=document.getElementById('err'),btn=document.getElementById('btn');
f.addEventListener('submit',async e=>{
  e.preventDefault(); err.textContent=''; btn.textContent='Descifrando…';
  try{
    const html=await decrypt(document.getElementById('pw').value);
    document.getElementById('body').innerHTML=html;
    document.getElementById('lock').style.display='none';
    document.getElementById('content').style.display='block';
    window.scrollTo(0,0);
  }catch(ex){
    err.textContent='Clave incorrecta. Intenta de nuevo.'; btn.textContent='Entrar';
  }
});
